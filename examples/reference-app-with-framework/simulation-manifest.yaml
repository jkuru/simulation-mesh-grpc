# Consumer SimulationManifest — the ONLY Istio-related artifact the service team authors.
# virtualization-framework generates VS / SE / DR / EnvoyFilters from this CR.
apiVersion: simulation.io/v1alpha1
kind: SimulationManifest
metadata:
  name: reference-app-simulation
  namespace: poc
spec:
  microcksService: microcks-svc.simulation-system.svc.cluster.local:9090
  thirdParties:
    - name: external-risk
      host: external-risk-api.com
      port: 9003
      backendHost: external-risk.poc.svc.cluster.local
      backendPort: 9003
      proto: |
        syntax = "proto3";
        package risk.v1;
        service RiskService {
          rpc EvaluateRisk (RiskRequest) returns (RiskResponse);
        }
        message RiskRequest {
          string card_token   = 1;
          int64  amount_cents = 2;
        }
        message RiskResponse {
          int32           risk_score   = 1;
          string          decision     = 2;
          repeated string risk_factors = 3;
        }
  scenarios:
    - name: fraud-approved
      responses:
        external-risk:
          - operation: EvaluateRisk
            body: '{ "risk_score": 5, "decision": "APPROVE", "risk_factors": [] }'
    - name: fraud-declined
      responses:
        external-risk:
          - operation: EvaluateRisk
            body: '{ "risk_score": 92, "decision": "DECLINE", "risk_factors": ["VELOCITY_BREACH", "HIGH_AMOUNT"] }'
