apiVersion: batch/v1
kind: Job
metadata:
  name: reference-app-with-framework-test
  namespace: poc
  labels:
    app: test-client
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: test-client
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      restartPolicy: Never
      containers:
        - name: test-client
          image: reference-app/test-client:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: CHECKOUT_GATEWAY_ENDPOINT
              value: checkout-gateway.poc.svc.cluster.local:9001
