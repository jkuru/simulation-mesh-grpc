# Mesh mode only — no app dial to Microcks. Istio (from the framework) routes.
apiVersion: v1
kind: ConfigMap
metadata:
  name: poc-config
  namespace: poc
data:
  LOG_LEVEL: "info"
  FRAUD_CHECKER_ENDPOINT: "fraud-checker.poc.svc.cluster.local:9002"
  SIMULATION_MODE: "mesh"
  EXTERNAL_RISK_ENDPOINT: "external-risk-api.com:9003"
  MICROCKS_ENDPOINT: "microcks-svc.simulation-system.svc.cluster.local:9090"
