# Application + backends ONLY — no VirtualService / ServiceEntry / EnvoyFilter.
# Those are generated by virtualization-framework from simulation-manifest.yaml.
#
#   kubectl apply -k kustomize/
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - configmap.yaml
  - checkout-gateway.yaml
  - fraud-checker.yaml
  - external-risk.yaml
  - microcks.yaml
  - peer-authentication.yaml
