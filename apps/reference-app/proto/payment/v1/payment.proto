// payment.v1 — Service A (payment-gateway) public API.
// Entry point for the teaching chain; never virtualized.
syntax = "proto3";
package payment.v1;
option go_package = "github.com/servicemesh/reference-app/gen/payment/v1;paymentv1";

service PaymentGateway {
  // Authorize a payment after consulting fraud-checker.
  rpc ProcessPayment (PaymentRequest) returns (PaymentResponse);
}

message PaymentRequest {
  string transaction_id = 1;
  string card_token     = 2;
  int64  amount_cents   = 3;
  string currency       = 4;
}

message PaymentResponse {
  string transaction_id  = 1;
  string status          = 2; // APPROVED | DECLINED
  string auth_code       = 3;
  string decline_reason   = 4;
  int32  risk_score      = 5; // echoed from fraud-checker for the demo client
  string recommendation  = 6; // echoed from fraud-checker
}
