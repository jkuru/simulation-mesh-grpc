// risk.v1 — third-party RiskService contract (the only virtualized dependency).
// Implemented by external-risk (real path) and microcks-mock (scenario path).
syntax = "proto3";
package risk.v1;
option go_package = "github.com/servicemesh/reference-app/gen/risk/v1;riskv1";

service RiskService {
  rpc EvaluateRisk (RiskRequest) returns (RiskResponse);
}

message RiskRequest {
  string card_token   = 1;
  int64  amount_cents = 2;
}

message RiskResponse {
  int32           risk_score   = 1; // 0–100
  string          decision     = 2; // APPROVE | DECLINE
  repeated string risk_factors = 3;
}
