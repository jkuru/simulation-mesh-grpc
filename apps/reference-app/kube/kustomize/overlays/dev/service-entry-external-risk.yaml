# Declares third-party host external-risk-api.com so VirtualService can match it.
# Teaching clusters map it to the in-cluster external-risk Service (no internet).
apiVersion: networking.istio.io/v1beta1
kind: ServiceEntry
metadata:
  name: external-risk-api
  namespace: poc
spec:
  hosts:
    - external-risk-api.com
  location: MESH_INTERNAL
  ports:
    - number: 9003
      name: grpc
      protocol: GRPC
  resolution: DNS
  endpoints:
    - address: external-risk.poc.svc.cluster.local
      ports:
        grpc: 9003
  exportTo:
    - "."
