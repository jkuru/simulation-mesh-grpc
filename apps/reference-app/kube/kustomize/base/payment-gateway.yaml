# Service A — payment entrypoint.
# No simulation-specific env. Header propagation is enabled by the label
# simulation.io/propagation=enabled (applied in the dev overlay or by kubectl).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-gateway
  labels:
    app: payment-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-gateway
  template:
    metadata:
      labels:
        app: payment-gateway
        # Overlay/dev sets simulation.io/propagation=enabled for EnvoyFilters.
    spec:
      containers:
        - name: payment-gateway
          image: reference-app/payment-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9001
              name: grpc
          env:
            - name: GRPC_PORT
              value: "9001"
          envFrom:
            - configMapRef:
                name: poc-config
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: payment-gateway
  labels:
    app: payment-gateway
spec:
  selector:
    app: payment-gateway
  ports:
    - name: grpc
      port: 9001
      targetPort: grpc
      appProtocol: grpc
