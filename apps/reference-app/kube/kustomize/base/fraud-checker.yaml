# Service B — fraud evaluation; outbound call to third-party RiskService is virtualized.
# In mesh mode SIMULATION_MODE=mesh: app always dials EXTERNAL_RISK_ENDPOINT;
# Istio VirtualService redirects when the simulation header is present.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-checker
  labels:
    app: fraud-checker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fraud-checker
  template:
    metadata:
      labels:
        app: fraud-checker
    spec:
      containers:
        - name: fraud-checker
          image: reference-app/fraud-checker:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9002
              name: grpc
          env:
            - name: GRPC_PORT
              value: "9002"
          envFrom:
            - configMapRef:
                name: poc-config
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: fraud-checker
  labels:
    app: fraud-checker
spec:
  selector:
    app: fraud-checker
  ports:
    - name: grpc
      port: 9002
      targetPort: grpc
      appProtocol: grpc
