apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  labels:
    app.kubernetes.io/managed-by: virtualization-framework
    simulation.io/manifest: reference-app-simulation
  name: external-risk-third-party
  namespace: poc
spec:
  host: external-risk-api.com
  trafficPolicy:
    connectionPool:
      http:
        h2UpgradePolicy: UPGRADE
    tls:
      mode: DISABLE
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  labels:
    app.kubernetes.io/managed-by: virtualization-framework
    simulation.io/manifest: reference-app-simulation
  name: microcks-grpc
  namespace: poc
spec:
  host: microcks-svc.simulation-system.svc.cluster.local
  trafficPolicy:
    connectionPool:
      http:
        h2UpgradePolicy: UPGRADE
    tls:
      mode: DISABLE
---
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  labels:
    app.kubernetes.io/managed-by: virtualization-framework
    simulation.io/manifest: reference-app-simulation
  name: vf-inbound-capture
  namespace: poc
spec:
  configPatches:
  - applyTo: HTTP_FILTER
    match:
      context: SIDECAR_INBOUND
      listener:
        filterChain:
          filter:
            name: envoy.filters.network.http_connection_manager
    patch:
      operation: INSERT_BEFORE
      value:
        name: envoy.filters.http.lua
        typed_config:
          '@type': type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
          inlineCode: |
            local HEADER    = "test-data-simulation-action-name"
            local STATE_KEY = "test.simulation.action.name"
            function envoy_on_request(request_handle)
              local scenario = request_handle:headers():get(HEADER)
              if scenario ~= nil and scenario ~= "" then
                request_handle:streamInfo():dynamicMetadata():set("envoy.filters.http.lua", STATE_KEY, scenario)
              end
            end
  workloadSelector:
    labels:
      simulation.io/propagation: enabled
---
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  labels:
    app.kubernetes.io/managed-by: virtualization-framework
    simulation.io/manifest: reference-app-simulation
  name: vf-outbound-inject
  namespace: poc
spec:
  configPatches:
  - applyTo: HTTP_FILTER
    match:
      context: SIDECAR_OUTBOUND
      listener:
        filterChain:
          filter:
            name: envoy.filters.network.http_connection_manager
    patch:
      operation: INSERT_BEFORE
      value:
        name: envoy.filters.http.lua
        typed_config:
          '@type': type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
          inlineCode: |
            local HEADER    = "test-data-simulation-action-name"
            local STATE_KEY = "test.simulation.action.name"
            function envoy_on_request(request_handle)
              local meta = request_handle:streamInfo():dynamicMetadata():get("envoy.filters.http.lua")
              if meta ~= nil and meta[STATE_KEY] ~= nil then
                request_handle:headers():replace(HEADER, meta[STATE_KEY])
              end
            end
  workloadSelector:
    labels:
      simulation.io/propagation: enabled
---
apiVersion: networking.istio.io/v1beta1
kind: ServiceEntry
metadata:
  labels:
    app.kubernetes.io/managed-by: virtualization-framework
    simulation.io/manifest: reference-app-simulation
  name: external-risk-serviceentry
  namespace: poc
spec:
  endpoints:
  - address: external-risk.poc.svc.cluster.local
    ports:
      grpc: 9003
  exportTo:
  - .
  hosts:
  - external-risk-api.com
  location: MESH_INTERNAL
  ports:
  - name: grpc
    number: 9003
    protocol: GRPC
  resolution: DNS
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  labels:
    app.kubernetes.io/managed-by: virtualization-framework
    simulation.io/manifest: reference-app-simulation
  name: external-risk-simulation
  namespace: poc
spec:
  hosts:
  - external-risk-api.com
  http:
  - match:
    - headers:
        test-data-simulation-action-name:
          regex: .+
    name: simulate
    route:
    - destination:
        host: microcks-svc.simulation-system.svc.cluster.local
        port:
          number: 9090
  - name: real
    route:
    - destination:
        host: external-risk-api.com
        port:
          number: 9003
