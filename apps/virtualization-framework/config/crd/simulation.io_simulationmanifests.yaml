apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: simulationmanifests.simulation.io
  labels:
    app.kubernetes.io/name: virtualization-framework
    app.kubernetes.io/part-of: virtualization-framework
spec:
  group: simulation.io
  names:
    kind: SimulationManifest
    listKind: SimulationManifestList
    plural: simulationmanifests
    singular: simulationmanifest
    shortNames:
      - simm
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Status
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required: [thirdParties, scenarios]
              properties:
                thirdParties:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [name, host, port]
                    properties:
                      name:
                        type: string
                      host:
                        type: string
                      port:
                        type: integer
                        minimum: 1
                        maximum: 65535
                      proto:
                        type: string
                      backendHost:
                        type: string
                        description: Optional in-cluster real backend host for ServiceEntry endpoints
                      backendPort:
                        type: integer
                scenarios:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [name, responses]
                    properties:
                      name:
                        type: string
                      responses:
                        type: object
                        additionalProperties:
                          type: array
                          items:
                            type: object
                            properties:
                              operation:
                                type: string
                              body:
                                type: string
                microcksService:
                  type: string
                  description: "host:port of virtual backend (default microcks-svc.simulation-system.svc.cluster.local:9090; filled by mutating webhook if empty)"
                virtualBackend:
                  type: string
                  description: "teaching-mock (default) or microcks (real Microcks-compatible backend + header rewrite)"
                  enum: [teaching-mock, microcks]
                  default: teaching-mock
            status:
              type: object
              properties:
                phase:
                  type: string
                message:
                  type: string
                generatedResources:
                  type: array
                  items:
                    type: string
                observedGeneration:
                  type: integer
                  format: int64
