# Platform-admin persona: install/upgrade the framework and inspect cluster-wide state.
# Grant to platform engineers (ClusterRoleBinding), not application deployers.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: simulation-platform-admin
  labels:
    app.kubernetes.io/name: virtualization-framework
    simulation.io/rbac-persona: platform-admin
rules:
  # Full CR control cluster-wide (break-glass + multi-namespace support).
  - apiGroups: ["simulation.io"]
    resources: ["simulationmanifests", "simulationmanifests/status", "simulationmanifests/finalizers"]
    verbs: ["*"]
  # CRD lifecycle
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    resourceNames: ["simulationmanifests.simulation.io"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Operator deployment / webhook / secrets in system namespace (namespace-scoped via Role is better;
  # cluster-admin often used in kind. These verbs on namespaced resources still need RoleBinding
  # for restriction — this ClusterRole is intentionally broad for platform installers.)
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services", "serviceaccounts", "secrets", "configmaps", "namespaces", "events", "pods", "pods/log"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles", "clusterrolebindings", "roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["validatingwebhookconfigurations", "mutatingwebhookconfigurations"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Read/write Istio for break-glass debugging (prefer operator-managed objects).
  - apiGroups: ["networking.istio.io"]
    resources: ["virtualservices", "serviceentries", "destinationrules", "envoyfilters"]
    verbs: ["*"]
