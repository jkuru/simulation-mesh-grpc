# CA_BUNDLE is injected by scripts/install.sh (base64-encoded CA/server cert).
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: virtualization-framework-mutating
  labels:
    app.kubernetes.io/name: virtualization-framework
webhooks:
  - name: msimulationmanifest.simulation.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    matchPolicy: Equivalent
    timeoutSeconds: 10
    reinvocationPolicy: Never
    clientConfig:
      service:
        name: virtualization-framework-webhook
        namespace: simulation-system
        path: /mutate-simulation-io-v1alpha1-simulationmanifest
        port: 443
      caBundle: ${CA_BUNDLE}
    rules:
      - apiGroups: ["simulation.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["simulationmanifests"]
        scope: Namespaced
